<!DOCTYPE html>
<html lang="en">
<head>
    <title>My First Webpage</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        header{
            background-color: #4CAF50;
            color: white;
            padding: 15px;
        }

        .container{
            margin-top: 20px;
        }

        button{
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<div class="container">

    <h2>About HTML</h2>
    <p>
        HTML stands for HyperText Markup Language. It is used to create webpages.
    </p>

    <img src="https://via.placeholder.com/200" alt="Sample Image">

    <h3>Features of HTML</h3>
    <ul>
        <li>Easy to learn Jenkins hiiiiiii</li>
        <li>Used for web development</li>
        <li>Supported by all browsers</li>
    </ul>

    <button onclick="showMessage()">Click Me</button>

</div>

<script>
    function showMessage(){
        alert("Hello! You clicked the button.");
    }
</script>

</body>
</html>
